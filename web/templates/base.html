<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title> Marketplace DB — {% block title %}Dashboard{% endblock %}</title>
 <style>
 :root {
 --bg: #faf5f7;
 --bg-card: #ffffff;
 --bg-input: #fff8fa;
 --border: #f0d4e0;
 --border-hover: #e8a8c4;
 --text: #3d2b33;
 --text-muted: #8a6b7a;
 --accent: #d4548a;
 --accent-hover: #c0407a;
 --accent-light: #fce4ef;
 --green: #4caf7d;
 --green-light: #e8f5ee;
 --red: #e05555;
 --red-light: #fde8e8;
 --orange: #e8943a;
 --purple: #9b6bc4;
 --purple-light: #f3ecfa;
 --blue: #5b8fd4;
 --blue-light: #eaf1fb;
 --shadow: 0 2px 8px rgba(100, 50, 70, 0.08);
 --shadow-hover: 0 4px 16px rgba(100, 50, 70, 0.14);
 }

 * { margin: 0; padding: 0; box-sizing: border-box; }

 body {
 font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
 background: var(--bg);
 color: var(--text);
 line-height: 1.6;
 }

 /* Navigation */
 nav {
 background: var(--bg-card);
 border-bottom: 2px solid var(--border);
 padding: 0 24px;
 display: flex;
 align-items: center;
 height: 60px;
 position: sticky;
 top: 0;
 z-index: 100;
 box-shadow: 0 1px 4px rgba(100, 50, 70, 0.06);
 }

 nav .logo {
 font-size: 20px;
 font-weight: 800;
 color: var(--accent);
 text-decoration: none;
 margin-right: 32px;
 }

 nav a {
 color: var(--text-muted);
 text-decoration: none;
 padding: 18px 14px;
 font-size: 14px;
 font-weight: 500;
 border-bottom: 3px solid transparent;
 transition: all 0.2s;
 }

 nav a:hover, nav a.active {
 color: var(--accent);
 border-bottom-color: var(--accent);
 }

 .container {
 max-width: 1400px;
 margin: 0 auto;
 padding: 24px;
 }

 h1 { font-size: 26px; margin-bottom: 16px; color: var(--text); font-weight: 700; }
 h2 { font-size: 19px; margin-bottom: 12px; color: var(--text); font-weight: 600; }

 .card {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 20px;
 margin-bottom: 16px;
 box-shadow: var(--shadow);
 }

 .card-header {
 font-size: 15px;
 font-weight: 600;
 margin-bottom: 12px;
 color: var(--text);
 display: flex;
 align-items: center;
 gap: 8px;
 }

 .grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
 gap: 12px;
 }

 .grid-item {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 16px;
 text-decoration: none;
 color: var(--text);
 transition: all 0.2s;
 cursor: pointer;
 box-shadow: var(--shadow);
 }

 .grid-item:hover {
 border-color: var(--accent);
 transform: translateY(-2px);
 box-shadow: var(--shadow-hover);
 }

 .grid-item .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
 .grid-item .count { color: var(--text-muted); font-size: 13px; }

 .table-wrapper {
 overflow-x: auto;
 border-radius: 10px;
 border: 1px solid var(--border);
 }

 table { width: 100%; border-collapse: collapse; font-size: 13px; }

 th {
 background: var(--accent-light);
 color: var(--accent);
 font-weight: 600;
 text-align: left;
 padding: 10px 14px;
 border-bottom: 2px solid var(--border);
 white-space: nowrap;
 position: sticky;
 top: 0;
 }

 td {
 padding: 8px 14px;
 border-bottom: 1px solid var(--border);
 max-width: 300px;
 overflow: hidden;
 text-overflow: ellipsis;
 white-space: nowrap;
 }

 tr:hover td { background: var(--accent-light); }

 .sql-editor {
 width: 100%;
 min-height: 150px;
 background: var(--bg-input);
 color: var(--text);
 border: 2px solid var(--border);
 border-radius: 10px;
 padding: 14px;
 font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
 font-size: 14px;
 line-height: 1.5;
 resize: vertical;
 outline: none;
 tab-size: 4;
 }

 .sql-editor:focus {
 border-color: var(--accent);
 box-shadow: 0 0 0 3px rgba(212, 84, 138, 0.12);
 }

 .btn {
 display: inline-flex;
 align-items: center;
 gap: 6px;
 padding: 8px 18px;
 border-radius: 8px;
 font-size: 14px;
 font-weight: 500;
 cursor: pointer;
 border: 1px solid var(--border);
 background: var(--bg-card);
 color: var(--text);
 transition: all 0.2s;
 text-decoration: none;
 }

 .btn:hover { background: var(--accent-light); border-color: var(--accent); }

 .btn-primary {
 background: var(--accent);
 color: #fff;
 border-color: var(--accent);
 }

 .btn-primary:hover { background: var(--accent-hover); }
 .btn-sm { padding: 4px 12px; font-size: 12px; }

 .badge {
 display: inline-block;
 padding: 2px 10px;
 border-radius: 12px;
 font-size: 12px;
 font-weight: 500;
 }

 .badge-pk { background: var(--green-light); color: var(--green); }
 .badge-fk { background: var(--purple-light); color: var(--purple); }
 .badge-type { background: var(--blue-light); color: var(--blue); }

 .error {
 background: var(--red-light);
 border: 1px solid var(--red);
 border-radius: 10px;
 padding: 12px 16px;
 color: var(--red);
 margin-bottom: 16px;
 font-family: monospace;
 font-size: 13px;
 white-space: pre-wrap;
 }

 .success {
 background: var(--green-light);
 border: 1px solid var(--green);
 border-radius: 10px;
 padding: 12px 16px;
 color: var(--green);
 margin-bottom: 16px;
 }

 .query-list { display: flex; flex-direction: column; gap: 2px; }

 .query-item {
 padding: 8px 12px;
 border-radius: 8px;
 cursor: pointer;
 font-size: 13px;
 color: var(--text-muted);
 transition: all 0.15s;
 border: none;
 background: none;
 text-align: left;
 width: 100%;
 }

 .query-item:hover { background: var(--accent-light); color: var(--accent); }

 .category-title {
 font-size: 11px;
 font-weight: 700;
 color: var(--text-muted);
 text-transform: uppercase;
 letter-spacing: 0.5px;
 padding: 12px 12px 4px;
 }

 .query-layout {
 display: grid;
 grid-template-columns: 320px 1fr;
 gap: 16px;
 align-items: start;
 }

 .sidebar {
 position: sticky;
 top: 76px;
 max-height: calc(100vh - 100px);
 overflow-y: auto;
 }

 .schema-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
 gap: 16px;
 }

 .schema-table {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 12px;
 overflow: hidden;
 box-shadow: var(--shadow);
 }

 .schema-table-header {
 background: var(--accent-light);
 padding: 10px 14px;
 font-weight: 700;
 font-size: 15px;
 color: var(--accent);
 border-bottom: 2px solid var(--border);
 display: flex;
 align-items: center;
 gap: 8px;
 }

 .schema-col {
 display: flex;
 align-items: center;
 gap: 8px;
 padding: 6px 14px;
 font-size: 13px;
 border-bottom: 1px solid rgba(240, 212, 224, 0.5);
 }

 .schema-col:last-child { border-bottom: none; }
 .schema-col .col-name { font-weight: 500; min-width: 120px; }
 .schema-col .col-type { color: var(--text-muted); font-family: monospace; font-size: 12px; }

 .result-info {
 display: flex;
 align-items: center;
 justify-content: space-between;
 padding: 8px 0;
 font-size: 13px;
 color: var(--text-muted);
 }

 /* Graph container */
 .graph-container {
 background: var(--bg-card);
 border: 1px solid var(--border);
 border-radius: 12px;
 padding: 20px;
 margin-bottom: 24px;
 box-shadow: var(--shadow);
 overflow-x: auto;
 }

 .graph-container svg {
 display: block;
 margin: 0 auto;
 }

 @media (max-width: 768px) {
 .query-layout { grid-template-columns: 1fr; }
 .sidebar { position: static; max-height: none; }
 .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
 }
 </style>
</head>
<body>
 <nav>
 <a href="/" class="logo"> Marketplace DB</a>
 <a href="/" class="{% if request.path == '/' %}active{% endif %}"> Dashboard</a>
 <a href="/schema" class="{% if request.path == '/schema' %}active{% endif %}"> Schema</a>
 <a href="/query" class="{% if request.path == '/query' %}active{% endif %}"> SQL Query</a>
 <a href="/otl10" class="{% if request.path == '/otl10' %}active{% endif %}"> ОТЛ10</a>
 </nav>

 <div class="container">
 {% block content %}{% endblock %}
 </div>
</body>
</html>
